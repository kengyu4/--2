version: '3.8'

services:
  # 数据库服务
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: brushtopic
      MYSQL_USER: brushtopic
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/topic.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - brushtopic-network
    restart: always

  # 缓存服务
  redis:
    image: redis:6.2
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - brushtopic-network
    restart: always

  # 消息队列
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - brushtopic-network
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 服务注册中心
  nacos:
    image: nacos/nacos-server:v2.1.0
    container_name: nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=brushtopic
      - MYSQL_SERVICE_PASSWORD=password
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-log:/home/nacos/logs
    networks:
      - brushtopic-network
    restart: always
    depends_on:
      - mysql

  # 题目服务
  topic-service:
    build:
      context: ./springcloud-brushtopic-api/topic-api/topic-api-topic
      dockerfile: ../../Dockerfile
    container_name: topic-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/brushtopic?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false
      - SPRING_DATASOURCE_USERNAME=brushtopic
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    networks:
      - brushtopic-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - nacos
      - mysql
      - redis
      - rabbitmq

  # AI服务
  ai-service:
    build:
      context: ./springcloud-brushtopic-api/topic-api/topic-api-ai
      dockerfile: ../../Dockerfile
    container_name: ai-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/brushtopic?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false
      - SPRING_DATASOURCE_USERNAME=brushtopic
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    networks:
      - brushtopic-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - nacos
      - mysql
      - redis
      - rabbitmq

  # 系统服务
  system-service:
    build:
      context: ./springcloud-brushtopic-api/topic-api/topic-api-system
      dockerfile: ../../Dockerfile
    container_name: system-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/brushtopic?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false
      - SPRING_DATASOURCE_USERNAME=brushtopic
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    networks:
      - brushtopic-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - nacos
      - mysql
      - redis
      - rabbitmq

  # Web网关
  web-gateway:
    build:
      context: ./springcloud-brushtopic-api/topic-gateway/web-gateway
      dockerfile: ../../Dockerfile
    container_name: web-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
    networks:
      - brushtopic-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - nacos
      - topic-service
      - ai-service
      - system-service

  # 前端服务
  frontend:
    build:
      context: ./uni-app-vue3-brushtopic
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - brushtopic-network
    restart: always
    depends_on:
      - web-gateway

# 网络配置
networks:
  brushtopic-network:
    driver: bridge

# 数据持久化
volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  nacos-data:
  nacos-log: